version: '3.8'

services:
  bot-api:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: line-bot-poc
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - LINE_CHANNEL_ACCESS_TOKEN=${LINE_CHANNEL_ACCESS_TOKEN}
      - LINE_CHANNEL_SECRET=${LINE_CHANNEL_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      # SQLite 檔案掛載到本地
      - ./data:/app/data
    restart: unless-stopped
